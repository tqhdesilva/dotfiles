# Enable extended keys for Shift+Enter etc. in Claude Code
set -s extended-keys always
set -as terminal-features 'xterm*:extkeys'

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Enable mouse support
set -g mouse on

# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Improve pane visibility
# Set inactive pane border to a subtle gray
set -g pane-border-style fg=colour240
# Set active pane border to a bright blue
set -g pane-active-border-style fg=blue

# Background dimming for inactive panes
set -g window-style 'fg=colour247,bg=colour236'
set -g window-active-style 'fg=colour250,bg=black'

# Add a text status label to each pane's border
set -g pane-border-status top
set -g pane-border-format " [ #P: #{pane_current_command} ] "
set -g allow-passthrough on

# Highlight window in status bar when bell is received
set -g monitor-bell on
set -g visual-bell off
set -g bell-action other

